<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <title>Zenith Restaurant & Café</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        [data-lang="ar"] { direction: rtl; }
        [data-lang="fr"], [data-lang="en"] { direction: ltr; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800" data-lang="fr" id="body-content">

    <!-- Language Switcher -->
    <div class="fixed top-4 right-4 z-50 bg-white p-2 rounded-lg shadow-lg flex gap-2">
        <button onclick="changeLang('fr')" class="px-2 font-bold">FR</button>
        <button onclick="changeLang('ar')" class="px-2 font-bold">AR</button>
        <button onclick="changeLang('en')" class="px-2 font-bold">EN</button>
    </div>

    <!-- Header -->
    <header class="h-[60vh] bg-cover bg-center flex flex-col items-center justify-center text-white"
            style="background-image: url('https://images.unsplash.com/photo-1554118811-1e0d58224f24?auto=format&fit=crop&q=80&w=1600');">
        <div class="bg-black bg-opacity-60 p-8 rounded-xl text-center">
            <h1 class="text-4xl md:text-6xl font-bold mb-4" id="title">Zenith Restaurant & Café</h1>
            <p id="subtitle">L'excellence culinaire | تجربة تذوق فاخرة | Culinary Excellence</p>
        </div>
    </header>

    <!-- Menu -->
    <section class="py-16 max-w-6xl mx-auto px-4">
        <h2 class="text-3xl font-bold text-center mb-12" id="menu-title">Nos Spécialités | قائمة أطباقنا المميزة | Our Specialties</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <!-- Item -->
            <div class="bg-white p-5 rounded-2xl shadow-lg">
                <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?auto=format&fit=crop&q=80&w=400" class="rounded-xl w-full h-48 object-cover">
                <h3 class="text-xl font-bold mt-4">Burger Gourmet</h3>
                <p class="text-orange-600 font-bold my-2">85 DH</p>
                <a href="https://wa.me/2126XXXXXXXX" class="block text-center bg-green-600 text-white py-2 rounded-lg font-bold">WhatsApp</a>
            </div>
        </div>
    </section>

    <!-- Contact Buttons -->
    <div class="fixed bottom-6 left-6 flex flex-col gap-3">
        <a href="tel:+212600000000" class="bg-blue-600 text-white p-4 rounded-full shadow-lg">📞</a>
        <a href="#" class="bg-red-600 text-white p-4 rounded-full shadow-lg">📍</a>
    </div>

    <script>
        function changeLang(lang) {
            document.body.setAttribute('data-lang', lang);
            if(lang === 'ar') document.dir = 'rtl';
            else document.dir = 'ltr';
            // هنا يمكنك إضافة منطق تبديل النصوص بناءً على اللغة
            alert('تم تغيير اللغة إلى: ' + lang);
        }
    </script>
</body>
</html>
