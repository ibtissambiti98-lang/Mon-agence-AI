
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطعم الفخامة | Restaurant L'Élite</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap');

        :root {
            --gold: #d4af37;
            --gold-hover: #f3e5ab;
            --bg-dark: #0a0a0a;
            --bg-card: #141414;
            --text-light: #ffffff;
            --text-muted: #aaaaaa;
            --transition: all 0.4s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: 'Cairo', 'Poppins', sans-serif;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        body.ltr {
            direction: ltr;
            font-family: 'Poppins', sans-serif;
        }
        body.ltr .nav-links {
            margin-right: 0;
            margin-left: auto;
        }
        body.ltr .nav-links a {
            margin-right: 0;
            margin-left: 25px;
        }
        body.ltr .about-content {
            text-align: left;
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
        }

        .logo {
            font-family: 'Playfair Display', 'Cairo', serif;
            font-size: 26px;
            font-weight: 700;
            color: var(--gold);
            text-decoration: none;
            letter-spacing: 1px;
        }

        .nav-links {
            display: flex;
            list-style: none;
            margin-right: auto;
            align-items: center;
        }

        .nav-links a {
            color: var(--text-light);
            text-decoration: none;
            margin-left: 25px;
            font-size: 15px;
            font-weight: 500;
            transition: var(--transition);
        }

        .nav-links a:hover {
            color: var(--gold);
        }

        /* تصميم القائمة المنسدلة للغات */
        .lang-dropdown {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 8px 12px;
            font-size: 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            outline: none;
            transition: var(--transition);
            margin-left: 15px;
            font-family: 'Cairo', 'Poppins', sans-serif;
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23d4af37' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 10px center;
            background-size: 16px;
            padding-right: 35px;
        }
        body.ltr .lang-dropdown {
            margin-left: 0;
            margin-right: 15px;
        }
        .lang-dropdown option {
            background-color: var(--bg-card);
            color: var(--text-light);
        }

        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)), url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?auto=format&fit=crop&w=1920&q=80') no-repeat center center/cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        .hero h1 {
            font-family: 'Playfair Display', 'Cairo', serif;
            font-size: 4rem;
            color: var(--gold);
            margin-bottom: 20px;
        }

        .hero p {
            font-size: 1.3rem;
            max-width: 700px;
            margin-bottom: 35px;
            color: #e0e0e0;
            line-height: 1.8;
        }

        .btn-gold {
            background: linear-gradient(45deg, #d4af37, #aa7c11);
            color: #000;
            padding: 14px 36px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 700;
            font-size: 16px;
            box-shadow: 0 4px 20px rgba(214, 175, 55, 0.3);
            transition: var(--transition);
            border: none;
            cursor: pointer;
            display: inline-block;
        }

        .btn-gold:hover {
            transform: translateY(-3px);
            background: linear-gradient(45deg, #f3e5ab, #d4af37);
        }

        section {
            padding: 100px 8% 80px 8%;
        }

        .section-title {
            text-align: center;
            font-family: 'Playfair Display', 'Cairo', serif;
            font-size: 2.5rem;
            color: var(--gold);
            margin-bottom: 15px;
        }
        .section-title::after {
            content: '';
            display: block;
            width: 80px;
            height: 2px;
            background: var(--gold);
            margin: 15px auto 0 auto;
        }

        .section-subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 60px;
        }

        .about { background: #0f0f0f; }
        .about-content {
            max-width: 850px;
            margin: 0 auto;
            text-align: center;
            font-size: 1.15rem;
            line-height: 2;
            color: #dddddd;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px;
        }

        .menu-card {
            background: var(--bg-card);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid rgba(214, 175, 55, 0.05);
            transition: var(--transition);
        }

        .menu-card:hover {
            transform: translateY(-8px);
            border-color: rgba(214, 175, 55, 0.3);
        }

        .menu-img {
            width: 100%;
            height: 230px;
            object-fit: cover;
        }

        .menu-body { padding: 25px; }
        .menu-body h3 { font-size: 1.3rem; margin-bottom: 10px; color: #fff;}
        .menu-body p { color: var(--text-muted); font-size: 0.95rem; height: 50px; margin-bottom: 20px;}
        .menu-meta { display: flex; justify-content: space-between; align-items: center; }
        .price { color: var(--gold); font-weight: 700; font-size: 1.25rem; }

        .raw-materials { background: #0f0f0f; }
        .materials-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 30px;
        }
        .material-card {
            text-align: center; background: var(--bg-dark); border-radius: 10px; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.03);
        }
        .material-card img { width: 100%; height: 180px; object-fit: cover; }
        .material-card h4 { padding: 15px 10px; color: var(--gold); }

        .testimonials-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }
        .testi-card {
            background: var(--bg-card); padding: 30px; border-radius: 12px; border-left: 3px solid var(--gold);
        }
        .stars { color: var(--gold); margin-bottom: 15px; }
        .testi-text { color: #dddddd; font-style: italic; margin-bottom: 15px; font-size: 0.95rem;}
        .testi-author { color: var(--gold); font-weight: 600; }

        .booking {
            background: linear-gradient(rgba(10,10,10,0.9), rgba(10,10,10,0.9)), url('https://images.unsplash.com/photo-1414235077428-338989a2e8c0?auto=format&fit=crop&w=1200&q=80') no-repeat center center/cover;
            text-align: center;
        }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.75);
            display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.4s ease;
            z-index: 2000;
        }

        .smart-modal {
            background-color: #141414;
            padding: 35px;
            border-radius: 20px;
            width: 90%;
            max-width: 480px;
            text-align: center;
            border: 1px solid var(--gold);
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
            transform: scale(0.7) translateY(-50px);
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            position: relative;
        }

        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-overlay.active .smart-modal { transform: scale(1) translateY(0); }

        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 26px; cursor: pointer; color: var(--gold); }
        .info-box {
            background-color: #1a1a1a; border: 1px solid rgba(214,175,55,0.2);
            border-radius: 10px; padding: 12px; margin: 15px 0; font-size: 14px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .info-tag { font-weight: bold; color: var(--gold); }

        footer {
            background: #050505; padding: 60px 8% 30px 8%; border-top: 1px solid rgba(214, 175, 55, 0.1);
        }
        .footer-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 40px; margin-bottom: 40px;}
        .footer-col h4 { color: var(--gold); margin-bottom: 20px; font-family: 'Playfair Display', serif;}
        .footer-col p { color: var(--text-muted); line-height: 1.8; margin-bottom: 10px;}
        .footer-col a { color: var(--text-muted); text-decoration: none;}
        .footer-col a:hover { color: var(--gold); }
        .copyright { text-align: center; color: #444; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 20px;}
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo" id="logo-text">مطعم الفخامة</a>
        <ul class="nav-links">
            <li><a href="#about" class="lang-text" data-ar="من نحن" data-fr="À Propos" data-en="About Us">من نحن</a></li>
            <li><a href="#menu" class="lang-text" data-ar="القائمة" data-fr="Menu" data-en="Menu">القائمة</a></li>
            <li><a href="#materials" class="lang-text" data-ar="جودتنا" data-fr="Qualité" data-en="Our Quality">جودتنا</a></li>
            <li><a href="#booking" class="lang-text" data-ar="احجز طاولتك" data-fr="Réservation" data-en="Book Table">احجز طاولتك</a></li>
            <li><a href="#testimonials" class="lang-text" data-ar="آراء العملاء" data-fr="Avis" data-en="Reviews">آراء العملاء</a></li>
        </ul>
        
        <select id="languageSelect" class="lang-dropdown" onchange="changeLanguage(this.value)">
            <option value="ar">العربية</option>
            <option value="fr">Français</option>
            <option value="en">English</option>
        </select>
    </header>

    <section class="hero" id="home">
        <h1 id="hero-title" class="lang-text" data-ar="مطعم الفخامة" data-fr="Restaurant L'Élite" data-en="Restaurant L'Élite">مطعم الفخامة</h1>
        <p id="hero-desc" class="lang-text" 
           data-ar="تجربة طهي ملكية فريدة تجمع بين النكهات العالمية الساحرة والأجواء العصرية الراقية." 
           data-fr="Une expérience culinaire royale combinant des saveurs internationales captivantes et une atmosphère moderne." 
           data-en="A royal culinary experience combining captivating international flavors and a refined modern atmosphere.">
           تجربة طهي ملكية فريدة تجمع بين النكهات العالمية الساحرة والأجواء العصرية الراقية.
        </p>
        <a href="#booking" class="btn-gold lang-text" data-ar="احجز طاولتك الآن" data-fr="Réserver une Table" data-en="Book a Table Now">احجز طاولتك الآن</a>
    </section>

    <section class="about" id="about">
        <h2 class="section-title lang-text" data-ar="قصة الفخامة والخبرة" data-fr="Notre Histoire" data-en="Our Story">قصة الفخامة والخبرة</h2>
        <p class="section
